---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: manager-role
rules:
- apiGroups:
  - ""
  resources:
  - secrets
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - goauthentik.io
  resources:
  - authentikapplications
  verbs:
  - create
  - delete
  - get
  - list
  - patch
  - update
  - watch
- apiGroups:
  - goauthentik.io
  resources:
  - authentikapplications/finalizers
  verbs:
  - update
- apiGroups:
  - goauthentik.io
  resources:
  - authentikapplications/status
  verbs:
  - get
  - patch
  - update
