# Default values for authentik-operator

replicaCount: 1

image:
  repository: ghcr.io/JeffResc/authentik-k8s-operator
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# Authentik connection configuration
authentik:
  # URL of the Authentik instance (required)
  url: ""
  # Reference to an existing secret containing the API token
  existingSecret:
    # Name of the secret
    name: ""
    # Key in the secret containing the token
    key: "token"

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use
  # If not set and create is true, a name is generated using the fullname template
  name: ""

podAnnotations: {}

podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL
  readOnlyRootFilesystem: true

resources:
  limits:
    cpu: 500m
    memory: 128Mi
  requests:
    cpu: 10m
    memory: 64Mi

nodeSelector: {}

tolerations: []

affinity: {}

# Leader election configuration
leaderElection:
  enabled: true

# Metrics configuration
metrics:
  enabled: true
  port: 8080

# Health probe configuration
health:
  port: 8081

# Logging configuration
logging:
  # Log level (debug, info, warn, error)
  level: info
  # Development mode (pretty print logs)
  development: false
